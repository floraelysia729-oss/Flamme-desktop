name: Release Windows

on:
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: flamme-4/pnpm-lock.yaml

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: flamme-4
        run: pnpm install --frozen-lockfile

      - name: Build Python sidecar
        working-directory: flamme-4
        run: pnpm run build:sidecar

      - name: Build Tauri bundles
        working-directory: flamme-4
        run: pnpm run tauri:build:ci

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flamme-4/src-tauri/target/release/bundle/msi/*.msi
            flamme-4/src-tauri/target/release/bundle/nsis/*-setup.exe
          generate_release_notes: true
          body: |
            ## Install

            1. Download `*-setup.exe` or `.msi`
            2. Run the installer
            3. Open FLAMME from the Start menu
            4. Configure API keys in Settings (first run creates `%APPDATA%/com.llmwiki.flamme4/.env`)

            Windows may warn about an unsigned app — this is expected until code signing is added.
